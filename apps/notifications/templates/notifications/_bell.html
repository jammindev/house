{% load i18n %}
<a href="{% url 'app_notifications' %}"
   class="relative flex items-center justify-center p-2 rounded-xl hover:bg-gray-100/80 text-gray-500 hover:text-gray-700 transition-all"
   aria-label="{% trans 'Notifications' %}">
    <i data-lucide="bell" class="h-5 w-5"></i>
    {% if unread_count > 0 %}
    <span class="absolute -top-0.5 -right-0.5 flex h-4 w-4 items-center justify-center rounded-full bg-primary-600 text-[10px] font-bold text-white">
        {{ unread_count }}
    </span>
    {% endif %}
</a>
