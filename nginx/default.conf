server {
    listen 80;

    # Cache la version nginx dans les headers et pages d'erreur
    server_tokens off;

    # Compression gzip — assets statiques uniquement (pas l'API)
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
    gzip_proxied any;

    # Taille max des uploads (avatars, documents)
    client_max_body_size 50M;

    # Security headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "same-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; font-src 'self'; connect-src 'self'; frame-ancestors 'none';" always;

    # Bloque les fichiers sensibles (bots qui scannent)
    location ~ /\.(env|git|htaccess|htpasswd|DS_Store) {
        return 404;
    }

    # Les media files passent par Django pour vérification des droits.
    # Django répond avec X-Accel-Redirect et Nginx sert depuis /_protected_media/.
    location /media/ {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
    }

    # Location interne : uniquement accessible via X-Accel-Redirect, jamais directement.
    location /_protected_media/ {
        internal;
        alias /app/media/;
    }

    # Proxifie tout le reste vers Gunicorn
    location / {
        proxy_pass http://web:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        # Préserve le header positionné par Traefik (https)
        proxy_set_header X-Forwarded-Proto $http_x_forwarded_proto;
        proxy_read_timeout 60s;
    }
}
