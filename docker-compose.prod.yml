services:
  db:
    # pgvector/pgvector:pg16 = official postgres:16 (Debian) + the `vector`
    # extension preinstalled (parcours 21, hybrid semantic retrieval). Same PG
    # major as before, so the postgres-data volume is compatible; a REINDEX after
    # the alpine(musl)->debian(glibc) switch is prudent if text-index collation
    # ever looks off. See docs/parcours/PARCOURS_21_BACKLOG_TECHNIQUE.md.
    image: pgvector/pgvector:pg16
    restart: always
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: house
      POSTGRES_USER: house_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U house_user -d house"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: house:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media-files:/app/media
    networks:
      - internal

  # Scheduler des pings proactifs (agent → Telegram). Même image que web, mais
  # l'entrypoint gunicorn est remplacé par un tick idempotent en boucle
  # (voir apps/pings/services.py::send_due_pings).
  scheduler:
    image: house:latest
    restart: always
    depends_on:
      db:
        condition: service_healthy
      web:
        condition: service_started
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    entrypoint: ["python", "manage.py", "send_scheduled_pings", "--loop"]
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media-files:/app/media:ro
    networks:
      - internal
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.house.loadbalancer.server.port=80
      # HTTP → redirige vers HTTPS
      - traefik.http.routers.house-http.entrypoints=http
      - traefik.http.routers.house-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.house-http.middlewares=https-redirect@docker
      # HTTPS avec Let's Encrypt
      - traefik.http.routers.house-https.entrypoints=https
      - traefik.http.routers.house-https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.house-https.tls=true
      - traefik.http.routers.house-https.tls.certresolver=le

volumes:
  postgres-data:
  media-files:

networks:
  internal:
  traefik-public:
    external: true
