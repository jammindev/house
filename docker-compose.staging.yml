services:
  db:
    image: postgres:16-alpine
    restart: always
    volumes:
      - postgres-data-staging:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-house_staging}
      POSTGRES_USER: house_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U house_user -d ${POSTGRES_DB:-house_staging}"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build: .
    image: house:staging
    restart: always
    depends_on:
      db:
        condition: service_healthy
    env_file: .env
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
    volumes:
      - media-files-staging:/app/media
    networks:
      - internal

  nginx:
    image: nginx:alpine
    restart: always
    depends_on:
      - web
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - media-files-staging:/app/media:ro
    networks:
      - internal
      - traefik-public
    labels:
      - traefik.enable=true
      - traefik.docker.network=traefik-public
      - traefik.http.services.house-staging.loadbalancer.server.port=80
      # HTTP → redirige vers HTTPS
      - traefik.http.routers.house-staging-http.entrypoints=http
      - traefik.http.routers.house-staging-http.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.house-staging-http.middlewares=https-redirect@docker
      # HTTPS avec Let's Encrypt
      - traefik.http.routers.house-staging-https.entrypoints=https
      - traefik.http.routers.house-staging-https.rule=Host(`${DOMAIN}`)
      - traefik.http.routers.house-staging-https.tls=true
      - traefik.http.routers.house-staging-https.tls.certresolver=le

volumes:
  postgres-data-staging:
  media-files-staging:

networks:
  internal:
  traefik-public:
    external: true
