{% if request.user.avatar %}
    <img src="{{ request.user.avatar.url }}" alt="{{ request.user.display_name|default:request.user.email }}" class="h-9 w-9 rounded-full object-cover shrink-0">
{% else %}
    <div class="h-9 w-9 rounded-full bg-gradient-to-br from-primary-500 to-primary-700 flex items-center justify-center text-white text-sm font-bold shrink-0">
        {{ request.user.email|first|upper }}
    </div>
{% endif %}
<div class="min-w-0">
    <p class="text-sm font-semibold text-gray-900 truncate">
        {{ request.user.display_name|default:request.user.email }}
    </p>
    <p class="text-xs text-gray-500 truncate">{{ request.user.email }}</p>
</div>
