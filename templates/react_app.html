{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>House - Login</title>
    <link rel="stylesheet" href="{% static 'react/style.css' %}">
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center">
    <div class="container mx-auto px-4">
        <h1 class="text-3xl font-bold text-center mb-8">Welcome to House</h1>
        
        <!-- React component will mount here -->
        <div id="login-form" data-props='{"redirectUrl": "/dashboard/", "csrfToken": "{{ csrf_token }}"}'></div>
        
        <!-- Static fallback content (no JS) -->
        <noscript>
            <div class="max-w-md mx-auto p-6 bg-white rounded-lg shadow-md">
                <p class="text-red-600">JavaScript is required for this feature.</p>
                <a href="{% url 'login' %}" class="text-blue-600 hover:underline">Use classic login form</a>
            </div>
        </noscript>
    </div>

    <!-- Load React component -->
    <script type="module">
        import { mountComponent } from '{% static "react/mount.js" %}';
        import LoginForm from '{% static "react/LoginForm.js" %}';
        
        // Mount the component when DOM is ready
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                mountComponent('login-form', LoginForm);
            });
        } else {
            mountComponent('login-form', LoginForm);
        }
    </script>
</body>
</html>
