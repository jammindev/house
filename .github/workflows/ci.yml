name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    name: Backend tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: house_test
          POSTGRES_USER: house_user
          POSTGRES_PASSWORD: test_password
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgres://house_user:test_password@localhost:5432/house_test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements/test.txt

      - name: Install dependencies
        run: pip install -r requirements/test.txt

      - name: Run tests
        run: pytest --no-cov-on-fail -q

  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  deploy:
    name: Deploy to Production
    runs-on: self-hosted
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Pull latest code
        run: |
          cd ~/jammin-dev/apps/house
          git fetch origin main
          git reset --hard origin/main

      - name: Build & restart
        run: |
          cd ~/jammin-dev/apps/house
          /usr/local/bin/docker compose -f docker-compose.prod.yml build
          /usr/local/bin/docker compose -f docker-compose.prod.yml up -d

      - name: Run migrations
        run: |
          cd ~/jammin-dev/apps/house
          /usr/local/bin/docker compose -f docker-compose.prod.yml exec -T web python manage.py migrate

  deploy-staging:
    name: Deploy to Staging
    runs-on: self-hosted
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/develop' && github.event_name == 'push'

    steps:
      - name: Deploy to staging
        run: |
          cd ~/jammin-dev/apps/house-staging
          git fetch origin develop
          git reset --hard origin/develop
          COMPOSE_PROJECT_NAME=house-staging /usr/local/bin/docker compose -f docker-compose.staging.yml build
          COMPOSE_PROJECT_NAME=house-staging /usr/local/bin/docker compose -f docker-compose.staging.yml up -d
          COMPOSE_PROJECT_NAME=house-staging /usr/local/bin/docker compose -f docker-compose.staging.yml exec -T web python manage.py migrate
